services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartmoney}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-smartmoney}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-waha-db.sql:/docker-entrypoint-initdb.d/02-waha-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartmoney} -d ${POSTGRES_DB:-smartmoney}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_DIR: /app/models
    volumes:
      - models:/app/models
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: python -m ingest.scheduler
    env_file: .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_DIR: /app/models
    volumes:
      - models:/app/models
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build: .
    command: python -m processor.worker
    env_file: .env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MODEL_DIR: /app/models
    volumes:
      - models:/app/models
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:3000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      WHATSAPP_SESSIONS_POSTGRESQL_URL: postgresql://${POSTGRES_USER:-smartmoney}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/waha_sessions?sslmode=disable
      WHATSAPP_RESTART_ALL_SESSIONS: "true"
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME:-admin}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-changeme}
    volumes:
      - ./waha-media:/app/.media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  ntfy-cache:
  models:
